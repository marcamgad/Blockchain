\* Fixed instantiation: reputation updated only by a CONSENSUS-ordered action
\* that applies to every correct node atomically.
\* Expected: TLC reports NO violation within the bounded space.
SPECIFICATION Spec

CONSTANTS
    Nodes    = {p1, p2}
    NumVals  = 7
    InitRep  = 100
    Penalty  = 10
    Denom    = 100
    MaxSteps = 4
    Broken   = FALSE

INVARIANT
    TypeOK
    LeaderAgreement

CONSTRAINT
    StepConstraint

\* Terminating by the MaxSteps bound is intentional, not a liveness bug.
CHECK_DEADLOCK FALSE
