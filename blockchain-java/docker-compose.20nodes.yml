version: '3.8'

networks:
  blockchain-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

x-node-common: &node-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

x-node-env: &node-env
  API_PORT: 8000
  SERVER_PORT: 8000
  P2P_PORT: 6001
  NETWORK_ID: 101
  TARGET_BLOCK_TIME_MS: 5000
  DEBUG: "false"
  STORAGE_PATH: /app/data
  STORAGE_AES_KEY: ${STORAGE_AES_KEY}
  VALIDATOR_PUBKEYS: ${VALIDATOR_PUBKEYS}

services:
  node-seed:
    <<: *node-common
    container_name: node-seed
    hostname: node-seed
    environment:
      <<: *node-env
      NODE_ID: node-seed
      NODE_NAME: node-seed
      IS_SEED: "true"
      SEED_PEER: ""
      NODE_PRIVATE_KEY: ${NODE_SEED_PRIVATE_KEY}
    ports:
      - "8000:8000"
      - "6001:6001"
    volumes:
      - node-seed-data:/app/data
    networks:
      blockchain-net:
        ipv4_address: 172.28.0.2

  validator-1:
    <<: *node-common
    container_name: validator-1
    hostname: validator-1
    environment:
      <<: *node-env
      NODE_ID: validator-1
      NODE_NAME: validator-1
      IS_SEED: "false"
      SEED_PEER: node-seed:6001
      NODE_PRIVATE_KEY: ${NODE_VALIDATOR_1_PRIVATE_KEY}
    ports:
      - "8001:8000"
      - "6002:6001"
    volumes:
      - validator-1-data:/app/data
    depends_on:
      node-seed:
        condition: service_healthy
    networks:
      blockchain-net:
        ipv4_address: 172.28.0.10

  validator-2:
