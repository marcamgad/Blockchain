version: '3.8'

networks:
  hb-net:
    driver: bridge

x-node-common: &node-common
  build: .
  networks:
    - hb-net
  environment:
    - STORAGE_AES_KEY=${STORAGE_AES_KEY:-00112233445566778899aabbccddeeff}
    - NETWORK_ID=101
    - TARGET_BLOCK_TIME_MS=5000
    - VALIDATOR_PUBKEYS=${VALIDATOR_PUBKEYS}
services:

  hb-node-1:
    <<: *node-common
    container_name: hb-node-1
    hostname: hb-node-1
    ports:
      - "8001:8000"
      - "6001:6001"
    environment:
      - NODE_ID=hb-node-1
      - IS_SEED=true
      - SEED_PEER=
      - NODE_PRIVATE_KEY=${NODE_1_PRIVATE_KEY}
      - SERVER_PORT=8000
      - P2P_PORT=6001

  hb-node-2:
    <<: *node-common
    container_name: hb-node-2
    hostname: hb-node-2
    ports:
      - "8002:8000"
      - "6002:6001"
    environment:
      - NODE_ID=hb-node-2
      - IS_SEED=false
      - SEED_PEER=hb-node-1:6001
      - NODE_PRIVATE_KEY=${NODE_2_PRIVATE_KEY}
      - SERVER_PORT=8000
      - P2P_PORT=6001

