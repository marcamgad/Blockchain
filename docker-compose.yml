# HybridChain 20-node test cluster (Minimalist/Offline Version)
# Removed in-container healthchecks to bypass WSL/Docker DNS issues.
# All nodes are verified from the host via scripts/run-tests.sh.

version: "3.9"

networks:
  hybridchain:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24

x-node-defaults: &node-defaults
  image: hybridchain:latest
  networks:
    - hybridchain
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  node1:
    <<: *node-defaults
    container_name: hybridchain-node1
    hostname: node1
    env_file: envs/node1.env
    ports: ["8001:8000", "6001:6001"]
    volumes: ["node1-data:/app/data", "node1-logs:/app/logs"]

  node2:
    <<: *node-defaults
    container_name: hybridchain-node2
    hostname: node2
    env_file: envs/node2.env
    ports: ["8002:8000", "6002:6001"]
    volumes: ["node2-data:/app/data", "node2-logs:/app/logs"]
    depends_on: ["node1"]

